services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - .:/app
      - venv:/app/.venv
    environment:
      PYTHONDONTWRITEBYTECODE: 1
      SHARETREE_DEV: "true"
      SHARETREE_SESSION_SECRET: "${SHARETREE_SESSION_SECRET:-dev-secret-change-me}"
      SHARETREE_SHARE_ROOT: /app/files
      SHARETREE_DATA_PATH: /app/data
      SHARETREE_TRUST_HEADERS: "true"
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -ex
        pip install uv
        uv sync
        .venv/bin/sharetree

  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/frontend/node_modules
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -ex
        cd frontend
        npm install
        npm run build -- --watch

volumes:
  venv:
  node_modules:
