services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"  # admin
    depends_on:
      - api
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -ex
        cat << EOF > /etc/caddy/Caddyfile
        :80 {
          reverse_proxy api:8000 {
            header_up Remote-Groups admins
          }
        }
        EOF
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  api:
    image: python:3.13-slim
    restart: unless-stopped
    ports:
      - "8000:8000"  # not admin
    working_dir: /app
    volumes:
      - ..:/app
      - venv:/app/.venv
    environment:
      PYTHONDONTWRITEBYTECODE: 1
      SHARETREE_DEV: "true"
      SHARETREE_SESSION_SECRET: "${SHARETREE_SESSION_SECRET:-dev-secret-change-me}"
      SHARETREE_SHARE_ROOT: /app/files
      SHARETREE_DATA_PATH: /app/data
      SHARETREE_TRUST_HEADERS: "true"
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -ex
        pip install uv -q
        uv sync --frozen
        .venv/bin/sharetree

  frontend:
    image: node:22-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ..:/app
      - node_modules:/app/frontend/node_modules
    entrypoint: ["/bin/sh","-c"]
    command:
      - |
        set -ex
        cd frontend
        npm install
        npm run build -- --watch

volumes:
  venv:
  node_modules:
